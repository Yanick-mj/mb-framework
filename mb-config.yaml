# mb-framework Configuration
# Toggle agents and pipeline behavior without editing agent files

version: 1

agents:
  orchestrator: enabled
  dev: enabled
  be-dev: enabled
  fe-dev: enabled
  devops: enabled
  architect: enabled
  verifier: enabled
  tea: enabled
  pm: enabled
  sm: enabled
  quick-flow: enabled
  tech-writer: enabled
  ux-designer: enabled

pipeline:
  verifier_mandatory: true       # verifier runs even if not in pipeline
  auto_commit: false             # commit after successful verification
  max_retries: 2                 # max retries on agent failure
  context_summary: true          # pass summaries between agents
  chunk_size: 4                  # (v2.2) pause pipeline after N agents for context preservation

tracking:
  cost_log: true
  cost_log_path: "memory/cost-log.md"

provider:
  mode: "claude-code"            # claude-code | standalone (future)

# (v2) Stage-aware behavior
stage_aware:
  enabled: true                  # false = strict v1 behavior, ignore mb-stage.yaml
  default_stage: scale           # used if mb-stage.yaml absent
  early_agents_path: agents-early  # location of stage-only agents
