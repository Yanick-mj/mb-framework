{% from "partials/modal_shell.html" import modal %}
{% call modal("New", "Create Story") %}
<form hx-post="/api/stories/{{ project_name }}/form"
      hx-target="#modal-container"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful){this.closest('.modal-overlay').remove(); htmx.trigger(document.body, 'story-changed')}"
      class="create-story-form">

  <div class="form-group">
    <label for="title">Title</label>
    <input type="text" name="title" id="title" required placeholder="e.g. Fix auth bug on Safari" autofocus>
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea name="description" id="description" rows="4" placeholder="What needs to be done and why?"></textarea>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="priority">Priority</label>
      <select name="priority" id="priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select name="status" id="status">
        <option value="backlog">Backlog</option>
        <option value="todo" selected>Todo</option>
        <option value="in_progress">In Progress</option>
      </select>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    <button type="submit" class="btn btn-primary">Create Story</button>
  </div>
</form>
{% endcall %}
