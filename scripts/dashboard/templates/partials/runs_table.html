{% if runs %}
<table>
  <thead><tr><th>Time</th><th>Agent</th><th>Story</th><th>Action</th><th>Summary</th></tr></thead>
  <tbody>
    {% for r in runs %}
    <tr>
      <td class="mono">{{ r.ts[11:16] if r.ts else '' }}</td>
      <td><span class="agent-chip"><span class="agent-dot" style="background:var(--accent)"></span>{{ r.agent }}</span></td>
      <td class="mono">{{ r.story }}</td>
      <td>{{ r.action }}</td>
      <td>{{ r.summary }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<div style="padding:24px;text-align:center;color:var(--text-tertiary)">No runs recorded yet.</div>
{% endif %}
