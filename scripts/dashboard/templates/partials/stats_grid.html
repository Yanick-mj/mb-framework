<div class="stats-grid">
  <div class="stat-card"><span class="stat-value">{{ stats.total }}</span><span class="stat-label">Total</span></div>
  <div class="stat-card"><span class="stat-value">{{ stats.in_progress }}</span><span class="stat-label">In Progress</span></div>
  <div class="stat-card"><span class="stat-value">{{ stats.get("blocked", 0) }}</span><span class="stat-label">Blocked</span></div>
  <div class="stat-card"><span class="stat-value">{{ stats.done }}</span><span class="stat-label">Done</span></div>
</div>
